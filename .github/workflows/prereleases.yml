name: Prerelease

on:
  push:
    branches:
      - main
jobs:
  prerelease:
    if: ${{ github.repository_owner == 'onlineornot' }}
    name: Build & Publish a beta release to NPM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Modify package.json version
        run: node .github/version-script.js

      - name: Build
        run: pnpm run build

      - name: Check for errors
        run: pnpm run check
        env:
          NODE_OPTIONS: "--max_old_space_size=8192"

      - name: Publish Beta to NPM
        run: pnpm publish --tag beta --no-git-checks
        env:
          NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        working-directory: packages/onlineornot

      - name: Get Package Version
        run: echo "ONLINEORNOT_VERSION=$(npm view onlineornot@beta version)" >> $GITHUB_ENV
        working-directory: packages/onlineornot

  publish_prerelease_registry:
    if: ${{ github.repository_owner == 'onlineornot' }}
    name: Publish Prerelease Registry
    needs: prerelease
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build onlineornot
        run: pnpm run build
        env:
          NODE_ENV: "production"

      - name: Build & Publish Prerelease Registry
        run: pnpm run publish
        env:
          NODE_ENV: "production"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        working-directory: packages/prerelease-registry
