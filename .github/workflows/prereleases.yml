name: Publish Any Commit

on:
  pull_request:
  push:
    branches:
      - "**"
      - "!main"

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js 25
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Build SEA binary (verify)
        working-directory: packages/onlineornot
        run: pnpm run build:sea

      - name: Publish to pkg.pr.new
        run: pnpm dlx pkg-pr-new publish './packages/onlineornot'
